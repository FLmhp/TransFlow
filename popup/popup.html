<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransFlow</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="popup-header">
      <div class="logo">
        <span class="logo-icon">🌐</span>
        <span class="logo-text">TransFlow</span>
      </div>
      <label class="toggle-switch" title="Enable/Disable translation">
        <input type="checkbox" id="toggleEnabled" />
        <span class="slider"></span>
      </label>
    </header>

    <!-- Status -->
    <div class="status-bar" id="statusBar">
      <span id="statusText">Translation disabled</span>
    </div>

    <!-- Language selectors -->
    <section class="section">
      <div class="row">
        <div class="field">
          <label for="sourceLang">From</label>
          <select id="sourceLang">
            <option value="auto">Auto detect</option>
            <option value="en">English</option>
            <option value="zh-CN">Chinese (Simplified)</option>
            <option value="zh-TW">Chinese (Traditional)</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
          </select>
        </div>
        <span class="swap-arrow" id="swapLangs" title="Swap languages">⇄</span>
        <div class="field">
          <label for="targetLang">To</label>
          <select id="targetLang">
            <option value="zh-CN">Chinese (Simplified)</option>
            <option value="zh-TW">Chinese (Traditional)</option>
            <option value="en">English</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="pt">Portuguese</option>
            <option value="ru">Russian</option>
            <option value="ar">Arabic</option>
            <option value="it">Italian</option>
            <option value="nl">Dutch</option>
            <option value="pl">Polish</option>
            <option value="tr">Turkish</option>
            <option value="vi">Vietnamese</option>
            <option value="th">Thai</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Engine selector -->
    <section class="section">
      <label class="section-label">Translation Engine</label>
      <div class="engine-grid">
        <label class="engine-option" data-engine="google">
          <input type="radio" name="engine" value="google" />
          <span class="engine-icon">🔍</span>
          <span>Google</span>
        </label>
        <label class="engine-option" data-engine="deepl">
          <input type="radio" name="engine" value="deepl" />
          <span class="engine-icon">📘</span>
          <span>DeepL</span>
        </label>
        <label class="engine-option" data-engine="openai">
          <input type="radio" name="engine" value="openai" />
          <span class="engine-icon">🤖</span>
          <span>OpenAI</span>
        </label>
        <label class="engine-option" data-engine="gemini">
          <input type="radio" name="engine" value="gemini" />
          <span class="engine-icon">✨</span>
          <span>Gemini</span>
        </label>
      </div>
    </section>

    <!-- Feature toggles -->
    <section class="section">
      <label class="section-label">Features</label>
      <div class="feature-list">
        <label class="feature-item">
          <input type="checkbox" id="pdfEnabled" />
          <span>📄 PDF translation</span>
        </label>
        <label class="feature-item">
          <input type="checkbox" id="subtitleEnabled" />
          <span>🎬 Video subtitle translation</span>
        </label>
      </div>
    </section>

    <!-- Actions -->
    <div class="popup-actions">
      <button id="openOptions" class="btn-secondary">⚙ Settings</button>
      <button id="translateNow" class="btn-primary">Translate Page</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
