name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build all targets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turborepo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check
        continue-on-error: true

      - name: Build (turborepo)
        run: pnpm build

      - name: Unit tests (vitest)
        run: pnpm test

      - name: Install Playwright browsers (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E + visual regression tests (playwright)
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Chromium zip
        uses: actions/upload-artifact@v7
        with:
          name: transflow-chrome
          path: apps/chrome-ext/dist/transflow-chrome.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Firefox zip
        uses: actions/upload-artifact@v7
        with:
          name: transflow-firefox
          path: apps/firefox-ext/dist/transflow-firefox.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Safari zip
        uses: actions/upload-artifact@v7
        with:
          name: transflow-safari
          path: apps/safari-ext/dist/transflow-safari.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Userscript
        uses: actions/upload-artifact@v7
        with:
          name: transflow-userscript
          path: apps/script-ext/dist/transflow.user.js
          if-no-files-found: error
          retention-days: 30

      - name: Upload unpacked Chromium dist (for debugging)
        uses: actions/upload-artifact@v7
        with:
          name: transflow-chrome-unpacked
          path: apps/chrome-ext/dist/
          retention-days: 14
