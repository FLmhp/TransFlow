name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt javascript-based actions (checkout, setup-node, cache, upload-artifact,
  # pnpm/action-setup) into Node.js 24 instead of the deprecated Node.js 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turborepo
        uses: actions/cache@v4
        with:
          path: .turbo/cache
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check
        continue-on-error: true

      - name: Build (turborepo)
        run: pnpm build

      - name: Upload extension zip
        uses: actions/upload-artifact@v4
        with:
          name: transflow-extension
          path: apps/extension/dist/transflow-extension.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload unpacked dist (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: transflow-extension-unpacked
          path: apps/extension/dist/
          retention-days: 14
